services:
  airflow-init:
    build: .
    restart: "no"
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      # Ensure extra python dependencies are available in the image at runtime.
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}

      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"

      # Image/icon processing tuning (used by image_utils + DAG)
      HERBARIUM_IMAGE_WORKERS: ${HERBARIUM_IMAGE_WORKERS}
      HERBARIUM_MAX_SOURCE_PIXELS: ${HERBARIUM_MAX_SOURCE_PIXELS}
      HERBARIUM_IMAGES_ORIGINAL_DIR: ${HERBARIUM_IMAGES_ORIGINAL_DIR}
      HERBARIUM_IMAGES_ICON_DIR: ${HERBARIUM_IMAGES_ICON_DIR}
      HERBARIUM_IMAGES_LABEL_DIR: ${HERBARIUM_IMAGES_LABEL_DIR}
      HERBARIUM_LABEL_BBOX_NORM: ${HERBARIUM_LABEL_BBOX_NORM:-}
      HERBARIUM_LABEL_BBOX_MAP_JSON: ${HERBARIUM_LABEL_BBOX_MAP_JSON:-}
      HERBARIUM_LABEL_CROP_MODE: ${HERBARIUM_LABEL_CROP_MODE:-}

    volumes:
      - ./dags:/dags
      - ./plugins:/plugins
      - ./logs:/logs
      - ./images_data:/images_data
    networks:
      - herbarium_net
    command: >
      bash -c "
      set -e;
      airflow db migrate;
      airflow users create \
      --username admin \
      --password admin_pass \
      --firstname Airflow \
      --lastname Admin \
      --role Admin \
      --email admin@example.com || true;
      "
  airflow-webserver:
    command: webserver
    build: .
    depends_on:
      postgres-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
    

      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}

      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"

      AIRFLOW__CORE__DAGS_FOLDER: /dags
      AIRFLOW__CORE__PLUGINS_FOLDER: /plugins
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /logs

      # Connection used by PostgresHook in the DAG.
      AIRFLOW_CONN_POSTGRES_DEFAULT: ${AIRFLOW_CONN_POSTGRES_DEFAULT}

      # Used by the DAG to resolve where original images/icons live.
      HERBARIUM_IMAGES_ORIGINAL_DIR: ${HERBARIUM_IMAGES_ORIGINAL_DIR}
      HERBARIUM_IMAGES_ICON_DIR: ${HERBARIUM_IMAGES_ICON_DIR}
      HERBARIUM_IMAGES_LABEL_DIR: ${HERBARIUM_IMAGES_LABEL_DIR}
      HERBARIUM_IMAGE_WORKERS: ${HERBARIUM_IMAGE_WORKERS}
      HERBARIUM_MAX_SOURCE_PIXELS: ${HERBARIUM_MAX_SOURCE_PIXELS}
      HERBARIUM_LABEL_BBOX_NORM: ${HERBARIUM_LABEL_BBOX_NORM:-}
      HERBARIUM_LABEL_BBOX_MAP_JSON: ${HERBARIUM_LABEL_BBOX_MAP_JSON:-}
      HERBARIUM_LABEL_CROP_MODE: ${HERBARIUM_LABEL_CROP_MODE:-}
    volumes:
      - ./dags:/dags
      - ./plugins:/plugins
      - ./logs:/logs
      - ./images_data:/images_data
    networks:
      - herbarium_net


  airflow-scheduler:
    command: scheduler
    build: .
    depends_on:
      postgres-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:

      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}

      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"

      AIRFLOW__CORE__DAGS_FOLDER: /dags
      AIRFLOW__CORE__PLUGINS_FOLDER: /plugins
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /logs

      AIRFLOW_CONN_POSTGRES_DEFAULT: ${AIRFLOW_CONN_POSTGRES_DEFAULT}

      HERBARIUM_IMAGES_ORIGINAL_DIR: ${HERBARIUM_IMAGES_ORIGINAL_DIR}
      HERBARIUM_IMAGES_ICON_DIR: ${HERBARIUM_IMAGES_ICON_DIR}
      HERBARIUM_IMAGES_LABEL_DIR: ${HERBARIUM_IMAGES_LABEL_DIR}
      HERBARIUM_IMAGE_WORKERS: ${HERBARIUM_IMAGE_WORKERS}
      HERBARIUM_MAX_SOURCE_PIXELS: ${HERBARIUM_MAX_SOURCE_PIXELS}
      HERBARIUM_LABEL_BBOX_NORM: ${HERBARIUM_LABEL_BBOX_NORM:-}
      HERBARIUM_LABEL_BBOX_MAP_JSON: ${HERBARIUM_LABEL_BBOX_MAP_JSON:-}
      HERBARIUM_LABEL_CROP_MODE: ${HERBARIUM_LABEL_CROP_MODE:-}
    volumes:
      - ./dags:/dags
      - ./plugins:/plugins
      - ./logs:/logs
      - ./images_data:/images_data
    networks:
      - herbarium_net

  airflow-triggerer:
    command: triggerer
    build: .
    depends_on:
      postgres-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:

      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY}

      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"

      AIRFLOW__CORE__DAGS_FOLDER: /dags
      AIRFLOW__CORE__PLUGINS_FOLDER: /plugins
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /logs

      AIRFLOW_CONN_POSTGRES_DEFAULT: ${AIRFLOW_CONN_POSTGRES_DEFAULT}

      HERBARIUM_IMAGES_ORIGINAL_DIR: ${HERBARIUM_IMAGES_ORIGINAL_DIR}
      HERBARIUM_IMAGES_ICON_DIR: ${HERBARIUM_IMAGES_ICON_DIR}
      HERBARIUM_IMAGES_LABEL_DIR: ${HERBARIUM_IMAGES_LABEL_DIR}
      HERBARIUM_IMAGE_WORKERS: ${HERBARIUM_IMAGE_WORKERS}
      HERBARIUM_MAX_SOURCE_PIXELS: ${HERBARIUM_MAX_SOURCE_PIXELS}
      HERBARIUM_LABEL_BBOX_NORM: ${HERBARIUM_LABEL_BBOX_NORM:-}
      HERBARIUM_LABEL_BBOX_MAP_JSON: ${HERBARIUM_LABEL_BBOX_MAP_JSON:-}
      HERBARIUM_LABEL_CROP_MODE: ${HERBARIUM_LABEL_CROP_MODE:-}
    volumes:
      - ./dags:/dags
      - ./plugins:/plugins
      - ./logs:/logs
      - ./images_data:/images_data
    networks:
      - herbarium_net

networks:
  herbarium_net:
    driver: bridge
